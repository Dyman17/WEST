# Render configuration for two services: backend (Node) and frontend (static)
services:
  - type: web
    name: west-backend
    env: node
    branch: main
    dir: backend
    plan: free
    # Backend has no build step; install deps only
    buildCommand: npm ci
    startCommand: npm start
    # Add env vars below in Render dashboard or convert to secrets here.
    # envVars:
    #   - key: DATABASE_URL
    #     value: $DATABASE_URL
    #   - key: NODE_ENV
    #     value: production

  - type: static
    name: west-frontend
    branch: main
    dir: frontend
    plan: free
    # Install deps and run the frontend build
    buildCommand: npm ci && npm run build
    # Vite outputs to `dist/public` per `vite.config.ts`
    staticPublishPath: dist/public

# TODO:
# - Replace `buildCommand` and `staticPublishPath` with values from
#   `frontend/package.json` (e.g., `npm run build` output directory).
# - Add secrets on Render dashboard (Database URLs, API keys, etc.) or
#   encrypt them into this file using Render's secrets syntax if desired.